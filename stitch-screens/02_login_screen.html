<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>تسجيل الدخول / إنشاء حساب - شامل</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#6e2c00",
                        "outline": "#757682",
                        "secondary-container": "#86f2e4",
                        "tertiary-fixed-dim": "#ffb691",
                        "primary-fixed-dim": "#b6c4ff",
                        "primary-fixed": "#dce1ff",
                        "tertiary": "#4b1c00",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#00201d",
                        "tertiary-fixed": "#ffdbcb",
                        "secondary": "#006a61",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f1f0f7",
                        "on-tertiary-container": "#f39461",
                        "on-surface-variant": "#444651",
                        "primary": "#00236f",
                        "on-tertiary-fixed": "#341100",
                        "surface-dim": "#dad9e1",
                        "inverse-surface": "#2f3036",
                        "surface-container": "#eeedf4",
                        "secondary-fixed-dim": "#6bd8cb",
                        "on-error-container": "#93000a",
                        "surface": "#faf8ff",
                        "on-background": "#1a1b21",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#90a8ff",
                        "primary-container": "#1e3a8a",
                        "surface-variant": "#e3e1e9",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#b6c4ff",
                        "secondary-fixed": "#89f5e7",
                        "surface-bright": "#faf8ff",
                        "surface-tint": "#4059aa",
                        "surface-container-low": "#f4f3fa",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#005049",
                        "on-primary-fixed": "#00164e",
                        "background": "#faf8ff",
                        "surface-container-high": "#e9e7ef",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#773205",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e3e1e9",
                        "on-secondary-container": "#006f66",
                        "outline-variant": "#c5c5d3",
                        "on-surface": "#1a1b21",
                        "on-primary-fixed-variant": "#264191"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "stack-lg": "32px",
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "container-max": "1280px",
                        "gutter": "24px",
                        "margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "headline-lg": ["IBM Plex Sans Arabic"],
                        "label-sm": ["IBM Plex Sans Arabic"],
                        "body-lg": ["IBM Plex Sans Arabic"],
                        "headline-md": ["IBM Plex Sans Arabic"],
                        "body-md": ["IBM Plex Sans Arabic"],
                        "label-md": ["IBM Plex Sans Arabic"],
                        "display-lg": ["IBM Plex Sans Arabic"],
                        "display-lg-mobile": ["IBM Plex Sans Arabic"]
                    },
                    "fontSize": {
                        "headline-lg": ["30px", {"lineHeight": "38px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "display-lg": ["48px", {"lineHeight": "60px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "display-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-group:focus-within label {
            color: theme('colors.primary');
        }
        .input-group:focus-within input {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 1px theme('colors.primary');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden bg-surface">
<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-96 h-96 bg-secondary-container rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
<main class="w-full max-w-md bg-surface-container-lowest rounded-2xl shadow-xl border border-surface-variant p-stack-lg relative z-10">
<!-- Header -->
<div class="text-center mb-stack-lg">
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary mb-stack-sm tracking-tight">شامل</h1>
<p class="font-body-md text-body-md text-on-surface-variant">مرحباً بك مجدداً! يرجى تسجيل الدخول أو إنشاء حساب جديد للمتابعة.</p>
</div>
<!-- Auth Tabs (Visual only for this static demo, usually JS controlled) -->
<div class="flex bg-surface-container rounded-lg p-1 mb-stack-lg relative">
<div class="w-1/2 text-center py-2 rounded-md bg-surface-container-lowest shadow-sm text-primary font-label-md text-label-md font-bold cursor-pointer transition-colors">تسجيل الدخول</div>
<div class="w-1/2 text-center py-2 rounded-md text-on-surface-variant font-label-md text-label-md cursor-pointer hover:text-on-surface transition-colors">إنشاء حساب</div>
</div>
<!-- Form Area -->
<form action="#" class="space-y-stack-md" method="POST">
<!-- Input Field: Phone / Email -->
<div class="input-group relative">
<label class="absolute right-4 top-[-10px] bg-surface-container-lowest px-1 font-label-sm text-label-sm text-on-surface-variant transition-colors" for="identifier">رقم الهاتف أو البريد الإلكتروني</label>
<div class="relative">
<input class="w-full px-4 py-4 rounded-xl border border-outline-variant bg-transparent text-on-surface font-body-md text-body-md focus:outline-none focus:ring-0 transition-all placeholder-transparent" id="identifier" name="identifier" placeholder="رقم الهاتف أو البريد الإلكتروني" required="" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 transform -translate-y-1/2 text-outline-variant pointer-events-none">person</span>
</div>
</div>
<!-- Input Field: Password -->
<div class="input-group relative">
<label class="absolute right-4 top-[-10px] bg-surface-container-lowest px-1 font-label-sm text-label-sm text-on-surface-variant transition-colors" for="password">كلمة المرور</label>
<div class="relative">
<input class="w-full px-4 py-4 rounded-xl border border-outline-variant bg-transparent text-on-surface font-body-md text-body-md focus:outline-none focus:ring-0 transition-all placeholder-transparent" id="password" name="password" placeholder="كلمة المرور" required="" type="password"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 transform -translate-y-1/2 text-outline-variant cursor-pointer hover:text-on-surface-variant transition-colors" onclick="togglePasswordVisibility()">visibility_off</span>
</div>
</div>
<div class="flex justify-between items-center px-1">
<label class="flex items-center space-x-2 space-x-reverse cursor-pointer">
<input class="form-checkbox h-4 w-4 text-primary rounded border-outline-variant focus:ring-primary focus:ring-offset-surface-container-lowest" type="checkbox"/>
<span class="font-label-md text-label-md text-on-surface-variant">تذكرني</span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">نسيت كلمة المرور؟</a>
</div>
<!-- Primary Action Button -->
<button class="w-full py-4 bg-primary text-on-primary rounded-xl font-headline-md text-headline-md font-bold shadow-sm hover:bg-primary-container hover:shadow-md active:scale-95 transition-all duration-150 flex items-center justify-center gap-2" type="submit">
<span>المتابعة</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_back</span> <!-- Right-to-left arrow -->
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-stack-lg">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-4 font-label-md text-label-md text-outline">أو المتابعة باستخدام</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="space-y-stack-sm">
<button class="w-full py-3 px-4 flex items-center justify-center gap-3 border border-outline-variant rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-colors text-on-surface font-label-md text-label-md font-bold" type="button">
<!-- Fallback Google Icon using text/shape since external SVGs are restricted without placeholders -->
<div class="w-6 h-6 rounded-full bg-surface-variant flex items-center justify-center text-primary font-bold">G</div>
                المتابعة عبر Google
            </button>
<button class="w-full py-3 px-4 flex items-center justify-center gap-3 border border-outline-variant rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-colors text-on-surface font-label-md text-label-md font-bold" type="button">
<!-- Fallback Apple Icon -->
<span class="material-symbols-outlined">apps</span>
                المتابعة عبر Apple
            </button>
</div>
<!-- Footer / Terms -->
<div class="mt-stack-lg text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant leading-relaxed">
                بمتابعتك، أنت توافق على 
                <a class="text-primary hover:underline" href="#">شروط الخدمة</a> و 
                <a class="text-primary hover:underline" href="#">سياسة الخصوصية</a> الخاصة بتطبيق شامل.
            </p>
</div>
</main>
<script>
        // Simple script for password visibility toggle
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const icon = event.currentTarget;
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
