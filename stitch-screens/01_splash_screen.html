<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>

<title>شامل - Shamel Splash Screen</title>

                        "on-tertiary-container": "#f39461",
                        "on-surface-variant": "#444651",

                        "surface-dim": "#dad9e1",

<style>
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 40px;
            height: 40px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }

        /* Safari */
        @-webkit-keyframes spin {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .bg-pattern {
            background-color: #00236f; /* primary */
            background-image: radial-gradient(circle at 100% 100%, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.05) 15%, transparent 15%, transparent 100%),
                              radial-gradient(circle at 0% 0%, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.05) 25%, transparent 25%, transparent 100%);
            background-size: 100px 100px;
        }
        
        .logo-glow {
            box-shadow: 0 0 40px rgba(134, 242, 228, 0.3); /* secondary-container glow */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary m-0 p-0 h-screen w-screen overflow-hidden text-on-primary">
<!-- Splash Screen Container -->
<main class="w-full h-full flex flex-col items-center justify-center relative bg-pattern">
<!-- Background Ambient Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-primary-container opacity-50 blur-[100px]"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[70%] h-[70%] rounded-full bg-[#1e3a8a] opacity-40 blur-[120px]"></div>
</div>
<!-- Central Content -->
<div class="z-10 flex flex-col items-center justify-center gap-stack-lg max-w-[80%] text-center">
<!-- Logo Area -->
<div class="relative flex flex-col items-center">
<!-- App Icon/Logo Graphic (Using Material Icon as placeholder for actual logo) -->
<div class="w-24 h-24 md:w-32 md:h-32 bg-on-primary rounded-2xl flex items-center justify-center mb-stack-md logo-glow transition-transform duration-700 hover:scale-105">
<span class="material-symbols-outlined text-[64px] text-primary" style="font-variation-settings: 'FILL' 1;">
                        apps
                    </span>
</div>
<!-- Brand Name -->
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-primary tracking-tight">
                    شامل
                </h1>
</div>
<!-- Tagline -->
<p class="font-headline-md text-headline-md text-primary-fixed-dim opacity-90">
                كل احتياجاتك في تطبيق واحد
            </p>
<!-- Loading Indicator -->
<div class="mt-stack-lg flex flex-col items-center gap-stack-sm opacity-80">
<div class="loader"></div>
</div>
</div>
<!-- Footer / Version info (Optional but common) -->
<div class="absolute bottom-margin-mobile md:bottom-margin-desktop w-full text-center z-10">
<p class="font-label-sm text-label-sm text-primary-fixed-dim opacity-50">
                v1.0.0
            </p>
</div>
</main>
</body></html>
