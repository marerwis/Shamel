<body class="bg-background text-on-background min-h-screen pb-[100px]">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface shadow-sm">
<div class="flex items-center justify-between px-margin-mobile h-16 w-full max-w-container-max mx-auto">
<button aria-label="العودة" class="text-on-surface-variant hover:bg-surface-container-low transition-colors rounded-full p-2">
<span class="material-symbols-outlined text-2xl">arrow_forward</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile text-primary font-bold tracking-tight">تقييم الخدمة</h1>
<div class="w-10"></div> <!-- Spacer to center title -->
</div>
</header>
<main class="max-w-container-max mx-auto px-margin-mobile py-stack-lg md:px-margin-desktop space-y-stack-lg">
<!-- Provider Summary -->
<section class="bg-surface-container-lowest rounded-2xl shadow-sm p-6 flex flex-col md:flex-row items-center gap-6 border border-outline-variant/30">
<img class="w-24 h-24 rounded-full object-cover shadow-sm" data-alt="A professional headshot of a middle-eastern maintenance worker wearing a clean uniform, smiling slightly in a well-lit modern home interior setting. High-quality corporate photography style, bright lighting, soft blurred background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6BT4B_S5EpupMCTlLxy-SVuBRERirw9c7ITusKZLo8kZcXv7ywOdFb4Agc42SlvhyGVMiqdOFzHDPsKE96gjP9xEtoCWMxO6iHRDpF2n-BxrAfb0TOwPzajR79yXE3tGbm5OqaudgSenUja0v81Tc3nw7RrOrIzi7QdN_5P0q8mai-tfUljFXF6TuZlGCQEzeEihP_gQAJTQweElxcm_c9LswFSHrdhHTRzySCHd0rd-hVQiewyY6rdX4PnYszAVWC-lAYWd9r9lg"/>
<div class="text-center md:text-right">
<h2 class="font-headline-lg text-headline-lg-mobile text-on-surface mb-1">أحمد محمود</h2>
<p class="font-body-md text-body-md text-on-surface-variant">صيانة تكييف (سبليت)</p>
<div class="mt-2 inline-flex items-center gap-1 bg-surface-container-low px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[16px] text-outline">calendar_today</span>
<span class="font-label-md text-label-md text-outline">12 مايو 2024</span>
</div>
</div>
</section>
<!-- Star Rating -->

<h3 class="font-headline-md text-headline-md-mobile text-on-surface">كيف كانت تجربتك؟</h3>
<div class="flex gap-2 flex-row-reverse star-rating" dir="ltr">
<span class="material-symbols-outlined text-[48px] star text-outline-variant" data-value="5">star</span>
<span class="material-symbols-outlined text-[48px] star text-outline-variant" data-value="4">star</span>
<span class="material-symbols-outlined text-[48px] star text-outline-variant" data-value="3">star</span>
<span class="material-symbols-outlined text-[48px] star text-outline-variant" data-value="2">star</span>
<span class="material-symbols-outlined text-[48px] star text-outline-variant" data-value="1">star</span>
</div>
<p class="font-label-md text-label-md text-primary mt-2" id="rating-text">ممتاز</p>

</button>
</div>

<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md h-14 rounded-xl flex items-center justify-center gap-2 hover:bg-primary-container active:scale-[0.98] transition-all shadow-md">
<span>إرسال التقييم</span>
<span class="material-symbols-outlined text-[20px]">send</span>
</button>
</section>
</main>
<script>
        // Simple star rating logic
        document.addEventListener('DOMContentLoaded', () => {
            const stars = document.querySelectorAll('.star-rating .star');
            const ratingText = document.getElementById('rating-text');
            const ratingLabels = ['سيء', 'مقبول', 'جيد', 'جيد جداً', 'ممتاز'];

            // Initialize to 5 stars
            updateStars(5);

            stars.forEach(star => {
                star.addEventListener('click', (e) => {
                    const value = parseInt(e.target.getAttribute('data-value'));
                    updateStars(value);
                });
            });

            function updateStars(value) {
                stars.forEach(s => {
                    const starValue = parseInt(s.getAttribute('data-value'));
                    if (starValue <= value) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
                ratingText.textContent = ratingLabels[value - 1];
            }
        });
    </script>
